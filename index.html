<!DOCTYPE html>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; height: 100%; width: 100%; }
    body { background: radial-gradient(ellipse at center, #2c1810 0%, #0d0805 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Georgia, serif; }
    #loading-screen { position: fixed; inset: 0; background: radial-gradient(ellipse at center, #2c1810 0%, #0d0805 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 28px; transition: opacity 0.6s ease; }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-title { color: #e8dcc8; font-size: 22px; letter-spacing: 2px; opacity: 0.85; }
    #loading-subtitle { color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: 1px; margin-top: -18px; }
    #loading-bar-wrap { width: 260px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: linear-gradient(to right, #a0724a, #d4a96a); border-radius: 10px; transition: width 0.3s ease; }
    #loading-percent { color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 1px; }
    #loading-pages-preview { display: flex; gap: 8px; margin-top: 4px; }
    .loading-thumb { width: 52px; height: 39px; border-radius: 3px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); overflow: hidden; transition: opacity 0.4s; opacity: 0.3; }
    .loading-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .loading-thumb.loaded { opacity: 1; border-color: rgba(212,169,106,0.4); }
    #flipbook-wrapper { display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.6s ease; width: 100%; }
    #flipbook-wrapper.visible { opacity: 1; }
    #flipbook-container { display: flex; align-items: center; justify-content: center; width: 100%; }
    #flipbook { box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
    .page { width: 100%; height: 100%; overflow: hidden; background: #111; }
    .page img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .page-blank { width: 100%; height: 100%; background: #1a1008; }
    #zoom-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
    #zoom-overlay.active { display: flex; }
    #zoom-img-wrap { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; overflow: hidden; }
    #zoom-img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 4px; box-shadow: 0 30px 80px rgba(0,0,0,0.9); transition: transform 0.15s ease, opacity 0.25s ease; transform-origin: center center; user-select: none; -webkit-user-drag: none; }
    .zoom-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e8dcc8; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, opacity 0.2s; z-index: 1002; }
    .zoom-arrow:hover { background: rgba(255,255,255,0.18); }
    .zoom-arrow.hidden { opacity: 0; pointer-events: none; }
    #zoom-arrow-left  { left: 16px; }
    #zoom-arrow-right { right: 16px; }
    #zoom-page-indicator { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 12px; letter-spacing: 0.4px; pointer-events: none; }
    #zoom-close { position: fixed; top: 16px; right: 20px; color: rgba(255,255,255,0.5); font-size: 26px; cursor: pointer; z-index: 1003; line-height: 1; transition: color 0.2s; }
    #zoom-close:hover { color: #fff; }
    #zoom-hint-text { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.18); font-size: 11px; pointer-events: none; white-space: nowrap; }
    #controls { margin-top: 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18); color: #e8dcc8; padding: 9px 20px; border-radius: 30px; cursor: pointer; font-size: 13px; letter-spacing: 0.4px; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; white-space: nowrap; }
    .btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); }
    .btn:disabled { opacity: 0.25; cursor: default; }
    .btn.flipping { animation: btnPulse 0.55s ease; }
    @keyframes btnPulse { 0% { transform: scale(1); } 30% { transform: scale(0.93); } 70% { transform: scale(1.04); } 100% { transform: scale(1); } }
    #page-indicator { color: rgba(255,255,255,0.35); font-size: 13px; min-width: 90px; text-align: center; }
    .btn-icon { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18); color: #e8dcc8; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }

  // Injeta as páginas dinamicamente
  const flipbookEl = document.getElementById('flipbook');
  flipbookEl.innerHTML = '<div class="page page-blank"></div>';
  images.forEach(src => {
    const div = document.createElement('div');
    div.className = 'page';
    div.innerHTML = `<img data-src="${src}" src="" />`;
    flipbookEl.appendChild(div);
  });

  const INITIAL_LOAD  = 6;
  const PRELOAD_AHEAD = 6;
  const THUMB_WINDOW  = 5;
  const loaded = new Array(images.length).fill(false);
  let pageFlip = null;
  const isMobile = window.innerWidth <= 600;

  const previewContainer = document.getElementById('loading-pages-preview');
  const previewThumbs = [];
  const previewCount = Math.min(INITIAL_LOAD, images.length);
  for (let i = 0; i < previewCount; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'loading-thumb';
    const img = document.createElement('img');
    img.src = '';
    wrap.appendChild(img);
    previewContainer.appendChild(wrap);
    previewThumbs.push({ wrap, img });
  }

  function loadImage(index) {
    return new Promise(resolve => {
      if (loaded[index]) { resolve(); return; }
      const img = new Image();
      img.onload = img.onerror = () => {
        loaded[index] = true;
        injectImage(index);
        resolve();
      };
      img.src = images[index];
    });
  }

  function injectImage(index) {
    const pageImgs = document.querySelectorAll('#flipbook .page img');
    if (pageImgs[index]) pageImgs[index].src = images[index];
    const thumbEl = document.querySelector(`.thumb[data-index="${index}"]`);
    if (thumbEl) thumbEl.src = images[index];
  }

  async function initialLoad() {
    const bar     = document.getElementById('loading-bar');
    const percent = document.getElementById('loading-percent');
    let done = 0;
    const promises = [];
    for (let i = 0; i < INITIAL_LOAD; i++) {
      const p = loadImage(i).then(() => {
        done++;
        const pct = Math.round((done / INITIAL_LOAD) * 100);
        bar.style.width = pct + '%';
        percent.textContent = pct + '%';
        if (previewThumbs[i]) {
          previewThumbs[i].img.src = images[i];
          previewThumbs[i].wrap.classList.add('loaded');
        }
      });
      promises.push(p);
    }
    await Promise.all(promises);
  }

  function preloadAround(currentRealIndex) {
    const bgEl = document.getElementById('bg-loading');
    let pending = 0;
    for (let i = currentRealIndex; i < Math.min(currentRealIndex + PRELOAD_AHEAD, images.length); i++) {
      if (!loaded[i]) {
        pending++;
        loadImage(i).then(() => {
          pending--;
          if (pending === 0) bgEl.textContent = '';
        });
      }
    }
    if (pending > 0) bgEl.textContent = `Carregando páginas… (${pending} restantes)`;
  }

  function calcDimensions() {
    if (isMobile) {
      const pw = Math.floor(window.innerWidth * 0.96);
      const ph = Math.floor(pw * (3 / 4));
      return { pw, ph, portrait: true };
    }
    const maxW = Math.min(window.innerWidth * 0.92, 1200);
    const maxH = window.innerHeight * 0.60;
    let pw = Math.floor(maxW / 2);
    let ph = Math.floor(pw * (3 / 4));
    if (ph > maxH) { ph = Math.floor(maxH); pw = Math.floor(ph * (4 / 3)); }
    return { pw, ph, portrait: false };
  }

  function initFlipbook() {
    const { pw, ph, portrait } = calcDimensions();
    pageFlip = new St.PageFlip(document.getElementById('flipbook'), {
      width: pw, height: ph, size: 'fixed', drawShadow: true, flippingTime: 950,
      usePortrait: portrait, autoSize: false, maxShadowOpacity: 0.7, showCover: false,
      startPage: 0, mobileScrollSupport: false, clickEventForward: false,
      useMouseEvents: true, swipeDistance: 40, showPageCorners: false, disableFlipByClick: true
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.page'));

    pageFlip.on('init', () => {
      updateIndicator(); updateButtons(); buildThumbnails(); preloadAround(0);
    });

    pageFlip.on('flip', () => {
      updateIndicator(); updateButtons(); updateThumbs(); preloadAround(getCurrentRealPage());
    });

    window.addEventListener('resize', () => {
      if (!pageFlip) return;
      const dims = calcDimensions();
      pageFlip.update(dims.pw, dims.ph);
    });
  }

  function buildThumbnails() {
    const container = document.getElementById('thumbnails');
    container.innerHTML = '';
    for (let slot = 0; slot < THUMB_WINDOW; slot++) {
      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = '';
      wrap.appendChild(img);
      const label = document.createElement('div');
      label.className = 'thumb-label';
      wrap.appendChild(label);
      container.appendChild(wrap);
    }
    updateThumbs();
  }

  function getWindowStart(real) {
    const half = Math.floor(THUMB_WINDOW / 2);
    let start = real - half;
    start = Math.max(0, start);
    start = Math.min(start, images.length - THUMB_WINDOW);
    return Math.max(0, start);
  }

  function updateThumbs() {
    const real  = getCurrentRealPage();
    const start = getWindowStart(real);
    const slots = document.querySelectorAll('#thumbnails .thumb-wrap');

    slots.forEach((wrap, slot) => {
      const idx = start + slot;
      if (idx >= images.length) { wrap.style.visibility = 'hidden'; return; }
      wrap.style.visibility = 'visible';

      const img   = wrap.querySelector('.thumb');
      const label = wrap.querySelector('.thumb-label');

      img.dataset.index = idx;
      img.src   = loaded[idx] ? images[idx] : (images[idx]);
      img.title = `Página ${idx + 1}`;
      img.classList.toggle('active', idx === real || (!isMobile && idx === real + 1));
      label.textContent = `${idx + 1}`;

      const newImg = img.cloneNode(true);
      newImg.addEventListener('click', () => goToPage(idx));
      wrap.replaceChild(newImg, img);
    });
  }

  function getCurrentRealPage() { return Math.max(0, pageFlip.getCurrentPageIndex() - 1); }

  function getVisibleImageIndexes() {
    const real = getCurrentRealPage();
    if (isMobile) return [real];
    const indexes = [];
    if (real >= 0 && real < images.length) indexes.push(real);
    if (real + 1 < images.length) indexes.push(real + 1);
    return indexes;
  }

  function updateIndicator() {
    const real = getCurrentRealPage();
    const display = Math.min(real + 1, images.length);
    document.getElementById('page-indicator').textContent = `Página ${display} de ${images.length}`;
  }

  function updateButtons() {
    const current = pageFlip.getCurrentPageIndex();
    const total   = pageFlip.getPageCount();
    btnPrev.disabled = current <= 0;
    btnNext.disabled = current >= total - 2;
  }

  function goToPage(index) { pageFlip.flip(index + 1); }

  function animateBtn(btn) {
    btn.classList.remove('flipping');
    void btn.offsetWidth;
    btn.classList.add('flipping');
    btn.addEventListener('animationend', () => btn.classList.remove('flipping'), { once: true });
  }

  const zoomOverlay    = document.getElementById('zoom-overlay');
  const zoomImg        = document.getElementById('zoom-img');
  const zoomArrowLeft  = document.getElementById('zoom-arrow-left');
  const zoomArrowRight = document.getElementById('zoom-arrow-right');
  const zoomPageInd    = document.getElementById('zoom-page-indicator');
  let zoomScale = 1, zoomPages = [], zoomCurrent = 0;

  function openZoom(startIndex) {
    zoomPages   = getVisibleImageIndexes();
    zoomCurrent = zoomPages.indexOf(startIndex);
    if (zoomCurrent < 0) zoomCurrent = 0;
    zoomScale = 1;
    zoomImg.style.transform = 'scale(1)';
    zoomImg.style.opacity   = '1';
    zoomImg.src = images[zoomPages[zoomCurrent]];
    updateZoomNav();
    zoomOverlay.classList.add('active');
  }

  function updateZoomNav() {
    zoomPageInd.textContent = `Página ${zoomPages[zoomCurrent] + 1} de ${images.length}`;
    zoomArrowLeft.classList.toggle('hidden',  zoomCurrent <= 0);
    zoomArrowRight.classList.toggle('hidden', zoomCurrent >= zoomPages.length - 1);
  }

  function zoomGoTo(index) {
    zoomImg.style.opacity = '0';
    setTimeout(() => {
      zoomCurrent = index;
      zoomScale   = 1;
      zoomImg.style.transform = 'scale(1)';
      zoomImg.src = images[zoomPages[zoomCurrent]];
      zoomImg.style.opacity = '1';
      updateZoomNav();
    }, 200);
  }

  function closeZoom() { zoomOverlay.classList.remove('active'); }

  zoomArrowLeft.addEventListener('click',  () => { if (zoomCurrent > 0) zoomGoTo(zoomCurrent - 1); });
  zoomArrowRight.addEventListener('click', () => { if (zoomCurrent < zoomPages.length - 1) zoomGoTo(zoomCurrent + 1); });

  zoomOverlay.addEventListener('wheel', e => {
    e.preventDefault();
    zoomScale = Math.min(4, Math.max(1, zoomScale - e.deltaY * 0.002));
    zoomImg.style.transform = `scale(${zoomScale})`;
  }, { passive: false });

  zoomOverlay.addEventListener('click', e => {
    if (e.target === zoomOverlay || e.target === document.getElementById('zoom-img-wrap')) closeZoom();
  });

  document.getElementById('zoom-close').addEventListener('click', closeZoom);
  document.getElementById('btn-zoom').addEventListener('click', () => {
    const visible = getVisibleImageIndexes();
    if (visible.length > 0) openZoom(visible[0]);
  });
  document.getElementById('flipbook').addEventListener('dblclick', () => {
    const visible = getVisibleImageIndexes();
    if (visible.length > 0) openZoom(visible[0]);
  });

  const btnFs = document.getElementById('btn-fullscreen');
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      btnFs.textContent = '✕';
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }
  function exitFullscreen() {
    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
    btnFs.textContent = '⛶';
  }
  btnFs.addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement) btnFs.textContent = '⛶'; });

  const btnNext = document.getElementById('btn-next');
  const btnPrev = document.getElementById('btn-prev');

  document.addEventListener('keydown', e => {
    if (zoomOverlay.classList.contains('active')) {
      if (e.key === 'ArrowRight' && zoomCurrent < zoomPages.length - 1) zoomGoTo(zoomCurrent + 1);
      if (e.key === 'ArrowLeft'  && zoomCurrent > 0) zoomGoTo(zoomCurrent - 1);
      if (e.key === 'Escape') closeZoom();
      return;
    }
    if (e.key === 'ArrowRight') { animateBtn(btnNext); pageFlip.flipNext(); }
    if (e.key === 'ArrowLeft')  { animateBtn(btnPrev); pageFlip.flipPrev(); }
    if (e.key === 'Escape') exitFullscreen();
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  });

  btnNext.addEventListener('click', () => { animateBtn(btnNext); pageFlip.flipNext(); });
  btnPrev.addEventListener('click', () => { animateBtn(btnPrev); pageFlip.flipPrev(); });

  if (isMobile) {
    const flipbookEl = document.getElementById('flipbook');
    let touchXStart = null;
    flipbookEl.addEventListener('touchstart', e => {
      if (e.touches.length === 1) touchXStart = e.touches[0].clientX;
    }, { passive: true });

    flipbookEl.addEventListener('touchend', e => {
      if (touchXStart === null || !pageFlip) return;
      const touchXEnd = e.changedTouches[0].clientX;
      const deltaX = touchXEnd - touchXStart;
      if (deltaX < -40) { animateBtn(btnNext); pageFlip.flipNext(); } 
      else if (deltaX > 40) { animateBtn(btnPrev); pageFlip.flipPrev(); }
      touchXStart = null;
    });
  }

  (async () => {
    await initialLoad();
    initFlipbook();
    const loadingScreen   = document.getElementById('loading-screen');
    const flipbookWrapper = document.getElementById('flipbook-wrapper');
    loadingScreen.classList.add('fade-out');
    flipbookWrapper.classList.add('visible');
    setTimeout(() => loadingScreen.style.display = 'none', 700);
  })();
</script>
</body>

    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-64-scaled.jpg",
    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-65-scaled.jpg",
    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-66-scaled.jpg",
    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-67-scaled.jpg",
    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-68-scaled.jpg",
    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-69-scaled.jpg",
    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-70-scaled.jpg",
    "https://etc.ufma.br/wp-content/uploads/2026/03/Seres-2026-71-scaled.jpg"
 ];

  const INITIAL_LOAD = 4;
  const loaded = new Array(images.length).fill(false);
  let pageFlip = null;

  const flipbookEl = document.getElementById('flipbook');
  images.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'page';
    div.innerHTML = `<img data-index="${i}" src="" />`;
    flipbookEl.appendChild(div);
  });

  const thumbScroll = document.getElementById('thumbnails-scroll');
  images.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    wrap.innerHTML = `<img class="thumb" data-index="${i}" src="" /><div class="thumb-label">${i + 1}</div>`;
    wrap.addEventListener('click', () => goToPage(i));
    thumbScroll.appendChild(wrap);
  });

  function loadImage(index) {
    return new Promise(resolve => {
      if (loaded[index] || index >= images.length) { resolve(); return; }
      const img = new Image();
      img.onload = img.onerror = () => {
        loaded[index] = true;
        const pageImg = document.querySelector(`.page img[data-index="${index}"]`);
        if (pageImg) pageImg.src = images[index];
        const thumbImg = document.querySelector(`.thumb[data-index="${index}"]`);
        if (thumbImg) thumbImg.src = images[index];
        resolve();
      };
      img.src = images[index];
    });
  }

  async function initialLoad() {
    const bar = document.getElementById('loading-bar');
    const percent = document.getElementById('loading-percent');
    let done = 0;
    const promises = [];
    for (let i = 0; i < INITIAL_LOAD; i++) {
      promises.push(loadImage(i).then(() => {
        done++;
        const pct = Math.round((done / INITIAL_LOAD) * 100);
        bar.style.width = pct + '%';
        percent.textContent = pct + '%';
      }));
    }
    await Promise.all(promises);
  }

  function preloadAhead(currentIndex) {
    for (let i = currentIndex; i < currentIndex + 4; i++) {
      if (i < images.length) loadImage(i);
    }
  }

  function calcDimensions() {
    const area = document.getElementById('flipbook-area');
    const maxWidth = area.clientWidth * 0.98; 
    const maxHeight = area.clientHeight * 0.95;
    const imgWidth = 3543;
    const imgHeight = 2480;
    const ratio = imgWidth / imgHeight; 
    let pw = maxWidth;
    let ph = pw / ratio;
    if (ph > maxHeight) { ph = maxHeight; pw = ph * ratio; }
    return { pw: Math.floor(pw), ph: Math.floor(ph) };
  }

  function initFlipbook() {
    const dims = calcDimensions();
    pageFlip = new St.PageFlip(document.getElementById('flipbook'), {
      width: dims.pw, height: dims.ph, size: 'fixed', drawShadow: true,
      flippingTime: 1600, usePortrait: true, maxShadowOpacity: 0.85, 
      showCover: false, mobileScrollSupport: false, swipeDistance: 40
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.page'));

    pageFlip.on('flip', (e) => {
      const pageIndex = e.data; 
      updateUI(pageIndex);
      if (pageIndex > 0) preloadAhead(pageIndex - 1);
    });

    window.addEventListener('resize', () => {
      if (!pageFlip) return;
      const newDims = calcDimensions();
      pageFlip.update(newDims.pw, newDims.ph);
    });
  }

  function updateUI(pageIndex) {
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnZoom = document.getElementById('btn-zoom');
    const indicator = document.getElementById('page-indicator');

    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));

    if (pageIndex === 0) {
      indicator.textContent = `Início`;
      btnPrev.disabled = true;
      btnNext.disabled = false;
      btnZoom.disabled = true; 
    } else {
      const imgIndex = pageIndex - 1;
      indicator.textContent = `Página ${imgIndex + 1} de ${images.length}`;
      btnPrev.disabled = false;
      btnNext.disabled = (imgIndex >= images.length - 1);
      btnZoom.disabled = false;

      const activeThumb = document.querySelector(`.thumb[data-index="${imgIndex}"]`);
      if (activeThumb) {
        activeThumb.classList.add('active');
        activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }
  }

  function goToPage(imgIndex) { if (pageFlip) pageFlip.flip(imgIndex + 1); }

  let touchStartX = 0;
  document.getElementById('flipbook-area').addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, {passive: true});

  document.getElementById('flipbook-area').addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (diff > 40) pageFlip.flipNext();
    else if (diff < -40) pageFlip.flipPrev();
  }, {passive: true});

  document.getElementById('btn-next').addEventListener('click', () => pageFlip.flipNext());
  document.getElementById('btn-prev').addEventListener('click', () => pageFlip.flipPrev());

  const zoomOverlay = document.getElementById('zoom-overlay');
  const zoomImg = document.getElementById('zoom-img');

  function openZoom() {
    const currentPage = pageFlip.getCurrentPageIndex();
    if (currentPage === 0) return; 
    const imgIndex = currentPage - 1;
    zoomImg.src = images[imgIndex];
    document.getElementById('zoom-page-indicator').textContent = `Página ${imgIndex + 1}`;
    zoomOverlay.classList.add('active');
  }

  document.getElementById('btn-zoom').addEventListener('click', openZoom);
  document.getElementById('zoom-close').addEventListener('click', () => zoomOverlay.classList.remove('active'));

  let lastTap = 0;
  document.getElementById('flipbook-area').addEventListener('touchend', function(e) {
    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastTap;
    if (tapLength < 300 && tapLength > 0) { openZoom(); e.preventDefault(); }
    lastTap = currentTime;
  });

  (async () => {
    await initialLoad();
    initFlipbook();
    updateUI(0); 
    const loadingScreen = document.getElementById('loading-screen');
    const appContainer = document.getElementById('app-container');
    loadingScreen.classList.add('fade-out');
    appContainer.classList.add('visible');
    setTimeout(() => loadingScreen.style.display = 'none', 500);
    preloadAhead(INITIAL_LOAD);
  })();
</script>
</body>
</html>
